<header class="sticky top-0 z-50 flex justify-between items-center px-margin-desktop w-full h-20 bg-surface-container-lowest dark:bg-surface-dim shadow-[0px_4px_20px_rgba(26,54,93,0.08)]">
<div class="flex items-center gap-12">
<span class="font-display-lg text-2xl font-bold text-primary dark:text-primary-fixed cursor-pointer tracking-tight" routerLink="/">TourMate</span>
<nav class="hidden md:flex gap-8 items-center">
<a routerLink="/" 
   routerLinkActive="active" 
   #rlaHome="routerLinkActive"
   [routerLinkActiveOptions]="{exact: true}"
   [ngClass]="rlaHome.isActive ? 'text-primary dark:text-primary-fixed font-bold border-b-2 border-primary' : 'text-on-surface-variant dark:text-outline'"
   class="font-body-md text-body-md pb-1 hover:text-primary transition-colors cursor-pointer">Discover</a>
@if (authService.isAuthenticated()) {
<a routerLink="/bookings" 
   routerLinkActive="active" 
   #rlaBook="routerLinkActive"
   [ngClass]="rlaBook.isActive ? 'text-primary dark:text-primary-fixed font-bold border-b-2 border-primary' : 'text-on-surface-variant dark:text-outline'"
   class="font-body-md text-body-md pb-1 hover:text-primary transition-colors cursor-pointer">My Bookings</a>
}
</nav>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex items-center gap-4">
@if (!authService.isAuthenticated()) {
  <button routerLink="/auth" class="font-label-md text-label-md text-primary px-5 py-2.5 hover:bg-primary/5 hover:text-secondary rounded-full transition-all duration-300">Login</button>
  <button routerLink="/auth" [queryParams]="{tab: 'signup'}" class="font-label-md text-label-md bg-secondary text-on-secondary px-7 py-2.5 rounded-full shadow-md hover:shadow-lg hover:bg-secondary/90 hover:-translate-y-0.5 transition-all duration-300">Sign Up</button>
} @else {
  <div class="flex items-center gap-3">
    <!-- Wishlist Cart Button -->
    <button routerLink="/wishlist" class="relative flex items-center justify-center text-on-surface-variant cursor-pointer p-2 hover:bg-surface-container-high rounded-full transition-all outline-none border-none bg-transparent">
      <span class="material-symbols-outlined text-[24px]">favorite</span>
      @if (wishlistService.wishlistedPackageIds().size > 0) {
        <span class="absolute top-1 right-1 bg-error text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center translate-x-1 -translate-y-1 shadow-sm">
          {{ wishlistService.wishlistedPackageIds().size }}
        </span>
      }
    </button>

    <span class="material-symbols-outlined text-on-surface-variant cursor-pointer p-2 hover:bg-surface-container-high rounded-full transition-all">notifications</span>
    
    <!-- Profile Button -->
    <button routerLink="/profile" class="relative group outline-none border-none bg-transparent p-0 cursor-pointer rounded-full h-10 w-10 flex items-center justify-center overflow-hidden border-2 border-transparent hover:border-primary transition-all">
      @if (userService.userProfile()?.profilePicture) {
        <img [src]="getProfileImageUrl(userService.userProfile()!.profilePicture!)" class="w-full h-full object-cover rounded-full">
      } @else {
        <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-[28px]">account_circle</span>
      }
    </button>
    
    <span class="material-symbols-outlined text-on-surface-variant cursor-pointer p-2 hover:bg-surface-container-high rounded-full transition-all" (click)="logout()">logout</span>
  </div>
}
</div>
</div>
</header>
