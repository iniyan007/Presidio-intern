<div class="fixed top-20 right-2 z-[9999] flex flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto w-full max-w-sm rounded-xl p-4 shadow-[0px_8px_30px_rgba(0,0,0,0.12)] flex items-start gap-3"
      [ngClass]="{
        'bg-error !text-white': toast.type === 'error',
        'bg-[#2E7D32] text-white': toast.type === 'success',
        'bg-surface-container-highest text-on-surface': toast.type === 'info',
        'animate-toast-in': !toast.closing,
        'animate-toast-out': toast.closing
      }">
      
      <span class="material-symbols-outlined mt-0.5 shrink-0">
        @if (toast.type === 'error') { error }
        @else if (toast.type === 'success') { check_circle }
        @else { info }
      </span>

      <p class="text-sm font-medium leading-5 mt-0.5">{{ toast.message }}</p>

      <button (click)="toastService.remove(toast.id)" class="ml-auto opacity-70 hover:opacity-100 transition-opacity">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>
  }
</div>
