apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tourmate-backend-hpa
  namespace: tourmate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tourmate-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
