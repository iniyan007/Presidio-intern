<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-xl w-full">
    <!-- Card Container -->
    <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 p-8 border border-gray-100 relative overflow-hidden">
      <!-- Decorative element -->
      <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-gradient-to-br from-indigo-500/20 to-violet-500/20 blur-2xl"></div>
      
      <div class="text-center relative z-10 mb-8">
        <h2 class="text-3xl font-black text-gray-900 tracking-tight">Create an Account</h2>
        <p class="mt-2 text-sm text-gray-500 font-medium">Join NoviBus and book your journey today.</p>
      </div>

      <div *ngIf="error" class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium mb-6 flex items-start gap-2 border border-red-100">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 mt-0.5 shrink-0">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5 relative z-10">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="name" class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
            <input id="name" type="text" formControlName="name" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" placeholder="John Doe">
            <p *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="mt-1 text-sm text-red-500">Name is required</p>
          </div>
          
          <div>
            <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Email address</label>
            <input id="email" type="email" formControlName="email" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" placeholder="you@example.com">
            <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="mt-1 text-sm text-red-500">Valid email is required</p>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="password" class="block text-sm font-bold text-gray-700 mb-1">Password</label>
            <input id="password" type="password" formControlName="password" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" placeholder="••••••••">
            <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="mt-1 text-sm text-red-500">Min 6 characters required</p>
          </div>
          
          <div>
            <label for="phone" class="block text-sm font-bold text-gray-700 mb-1">Phone Number</label>
            <input id="phone" type="text" formControlName="phone" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" placeholder="9876543210">
            <p *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="mt-1 text-sm text-red-500">Phone is required</p>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="age" class="block text-sm font-bold text-gray-700 mb-1">Age</label>
            <input id="age" type="number" formControlName="age" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" placeholder="25">
            <p *ngIf="registerForm.get('age')?.invalid && registerForm.get('age')?.touched" class="mt-1 text-sm text-red-500">Must be at least 18</p>
          </div>
          
          <div>
            <label for="gender" class="block text-sm font-bold text-gray-700 mb-1">Gender</label>
            <select id="gender" formControlName="gender" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium">
              <option value="" disabled selected>Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
            <p *ngIf="registerForm.get('gender')?.invalid && registerForm.get('gender')?.touched" class="mt-1 text-sm text-red-500">Gender is required</p>
          </div>
        </div>

        <button type="submit" [disabled]="loading" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gray-900 hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 mt-4">
          <span *ngIf="loading" class="animate-spin mr-2 w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>
      
      <div class="mt-8 text-center relative z-10">
        <p class="text-sm text-gray-500 font-medium">
          Already have an account? 
          <a routerLink="/login" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
