<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative">
  <div class="mb-8 border-b border-gray-200 pb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 tracking-tight">Manage Routes</h1>
      <a href="/operator/dashboard" class="text-indigo-600 text-sm font-medium hover:underline">← Back to Dashboard</a>
    </div>
    <button (click)="showModal = true" class="bg-gray-900 hover:bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition-colors">
      Add Route
    </button>
  </div>

  <div *ngIf="routes.length === 0" class="text-center py-20 bg-gray-50 rounded-3xl border border-gray-100">
    <p class="text-gray-500">No routes created yet.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let route of routes" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
      <div class="flex items-center gap-4 mb-4">
        <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
          </svg>
        </div>
        <div>
          <h3 class="text-lg font-bold text-gray-900">{{ route.source }}</h3>
          <p class="text-sm text-gray-500">to {{ route.destination }}</p>
        </div>
      </div>
      <button (click)="deleteRoute(route.id)" class="w-full text-center text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 py-2 rounded-xl text-sm font-bold transition-colors">Delete Route</button>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
      <button (click)="showModal = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h2 class="text-2xl font-black text-gray-900 mb-6">Add New Route</h2>
      <form [formGroup]="routeForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Source (Starting Point)</label>
          <input type="text" formControlName="source" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Destination (End Point)</label>
          <input type="text" formControlName="destination" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" [disabled]="routeForm.invalid" class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold py-3 px-4 rounded-xl transition-colors mt-6">
          Save Route
        </button>
      </form>
    </div>
  </div>
</div>
