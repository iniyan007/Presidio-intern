<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative">
  <div class="mb-8 border-b border-gray-200 pb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 tracking-tight">Manage Buses</h1>
      <a href="/operator/dashboard" class="text-indigo-600 text-sm font-medium hover:underline">← Back to Dashboard</a>
    </div>
    <button (click)="showModal = true" class="bg-gray-900 hover:bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition-colors">
      Add New Bus
    </button>
  </div>

  <div *ngIf="buses.length === 0" class="text-center py-20 bg-gray-50 rounded-3xl border border-gray-100">
    <p class="text-gray-500">No buses added yet.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let bus of buses" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
      <div class="flex justify-between items-start mb-4">
        <h3 class="text-xl font-bold text-gray-900">{{ bus.name }} <span class="text-sm font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded ml-2">{{ bus.busNumber }}</span></h3>
        <span [ngClass]="{'bg-emerald-100 text-emerald-700': bus.isApproved, 'bg-orange-100 text-orange-700': !bus.isApproved}" class="px-2 py-1 text-xs font-bold rounded-full">
          {{ bus.isApproved ? 'Approved' : 'Pending' }}
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-2">Total Seats: <span class="font-bold text-gray-900">{{ bus.totalSeats }}</span></p>
      <p class="text-sm text-gray-500 mb-4">Base Price: <span class="font-bold text-gray-900">₹{{ bus.price }}</span></p>
      
      <div class="flex gap-2">
        <button (click)="deleteBus(bus.id)" class="text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg text-sm font-bold transition-colors">Delete</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
      <button (click)="showModal = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <h2 class="text-2xl font-black text-gray-900 mb-6">Add Bus</h2>
      <form [formGroup]="busForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Bus Name</label>
            <input type="text" formControlName="name" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Bus Number</label>
            <input type="text" formControlName="busNumber" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="e.g. TN-01-AB-1234">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Total Seats</label>
            <input type="number" formControlName="totalSeats" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Base Price</label>
            <input type="number" formControlName="price" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
          </div>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-colors mt-6">
          Submit for Approval
        </button>
      </form>
    </div>
  </div>
</div>
