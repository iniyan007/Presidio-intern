<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative">
  <div class="mb-8 border-b border-gray-200 pb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 tracking-tight">Manage Operators</h1>
      <a href="/admin/dashboard" class="text-indigo-600 text-sm font-medium hover:underline">← Back to Dashboard</a>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
  </div>

  <div *ngIf="!loading && operators.length === 0" class="text-center py-20 bg-gray-50 rounded-3xl border border-gray-100">
    <p class="text-gray-500">No operators registered yet.</p>
  </div>

  <div *ngIf="!loading && operators.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let op of operators" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
      <div class="flex justify-between items-start mb-4">
        <h3 class="text-xl font-bold text-gray-900">{{ op.companyName }}</h3>
        <span [ngClass]="{'bg-emerald-100 text-emerald-700': op.isApproved, 'bg-orange-100 text-orange-700': !op.isApproved}" class="px-2 py-1 text-xs font-bold rounded-full">
          {{ op.isApproved ? 'Approved' : 'Pending' }}
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-1">Owner: <span class="text-gray-900 font-medium">{{ op.userName }}</span></p>
      <p class="text-sm text-gray-500 mb-1">Email: <span class="text-gray-900 font-medium">{{ op.email }}</span></p>
      <p class="text-sm text-gray-500 mb-1">Contact: <span class="text-gray-900 font-medium">{{ op.contactNumber }}</span></p>
      <p class="text-sm text-gray-500 mb-4">Locations: <span class="text-gray-900 font-medium">{{ op.operatingLocation }}</span></p>
      
      <div class="flex gap-2 border-t border-gray-100 pt-4" *ngIf="op.isApproved">
        <button (click)="disableOperator(op.id)" class="w-full text-center text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 py-2 rounded-xl text-sm font-bold transition-colors">
          Disable Operator
        </button>
      </div>
    </div>
  </div>
</div>
