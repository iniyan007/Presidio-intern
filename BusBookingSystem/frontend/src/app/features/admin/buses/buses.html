<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative">
  <div class="mb-8 border-b border-gray-200 pb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-black text-gray-900 tracking-tight">All Buses</h1>
      <a href="/admin/dashboard" class="text-indigo-600 text-sm font-medium hover:underline">← Back to Dashboard</a>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
  </div>

  <div *ngIf="!loading && buses.length === 0" class="text-center py-20 bg-gray-50 rounded-3xl border border-gray-100">
    <p class="text-gray-500">No buses on the platform yet.</p>
  </div>

  <div *ngIf="!loading && buses.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let bus of buses" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col justify-between">
      <div>
        <div class="flex justify-between items-start mb-4">
          <h3 class="text-xl font-bold text-gray-900">{{ bus.name }} <span class="text-sm font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded ml-2">{{ bus.busNumber }}</span></h3>
          <span [ngClass]="{'bg-emerald-100 text-emerald-700': bus.isApproved, 'bg-orange-100 text-orange-700': !bus.isApproved}" class="px-2 py-1 text-xs font-bold rounded-full">
            {{ bus.isApproved ? 'Approved' : 'Pending' }}
          </span>
        </div>
        <p class="text-sm text-gray-500 mb-1">Operator: <span class="text-gray-900 font-medium">{{ bus.operatorName }}</span></p>
        <p class="text-sm text-gray-500 mb-1">Total Seats: <span class="text-gray-900 font-medium">{{ bus.totalSeats }}</span></p>
        <p class="text-sm text-gray-500 mb-4">Base Price: <span class="text-gray-900 font-medium">₹{{ bus.price }}</span></p>
      </div>
      <div class="flex gap-2 border-t border-gray-100 pt-4" *ngIf="!bus.isApproved">
        <button (click)="approveBus(bus.id)" class="flex-1 text-center text-emerald-600 hover:text-emerald-700 bg-emerald-50 hover:bg-emerald-100 py-2 rounded-xl text-sm font-bold transition-colors">
          Approve
        </button>
        <button (click)="rejectBus(bus.id)" class="flex-1 text-center text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 py-2 rounded-xl text-sm font-bold transition-colors">
          Reject
        </button>
      </div>
      <div class="flex gap-2 border-t border-gray-100 pt-4" *ngIf="bus.isApproved">
        <button (click)="rejectBus(bus.id)" class="w-full text-center text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 py-2 rounded-xl text-sm font-bold transition-colors">
          Disable/Reject Bus
        </button>
      </div>
    </div>
  </div>
</div>
