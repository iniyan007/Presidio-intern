<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200/50 shadow-sm transition-all">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">
      <div class="flex items-center">
        <a routerLink="/" class="flex-shrink-0 flex items-center gap-2 group cursor-pointer">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white flex items-center justify-center shadow-lg shadow-indigo-200 group-hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
            </svg>
          </div>
          <span class="font-black text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 group-hover:to-indigo-600 transition-colors duration-300">NoviBus</span>
        </a>
      </div>
      <div class="hidden sm:flex sm:items-center sm:space-x-8">
        <a routerLink="/" routerLinkActive="text-indigo-600 font-semibold" [routerLinkActiveOptions]="{exact: true}" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Home</a>
        <a routerLink="/search" routerLinkActive="text-indigo-600 font-semibold" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Book a Bus</a>

        <!-- Authenticated Links -->
        <ng-container *ngIf="authService.isAuthenticated()">
          
          <!-- User Links -->
          <ng-container *ngIf="!authService.isAdmin() && !authService.isOperator()">
            <a routerLink="/bookings" routerLinkActive="text-indigo-600 font-semibold" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">My Bookings</a>
          </ng-container>

          <!-- Admin Links -->
          <ng-container *ngIf="authService.isAdmin()">
            <a routerLink="/admin/dashboard" routerLinkActive="text-indigo-600 font-semibold" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Admin Dashboard</a>
          </ng-container>

          <!-- Operator Links -->
          <ng-container *ngIf="authService.isOperator()">
            <a routerLink="/operator/dashboard" routerLinkActive="text-indigo-600 font-semibold" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Operator Dashboard</a>
          </ng-container>

          <div class="relative group ml-4">
            <button class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-full font-medium transition-colors">
              <div class="w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-bold">
                {{ authService.currentUser()?.name?.charAt(0) | uppercase }}
              </div>
              <span class="text-sm max-w-[100px] truncate">{{ authService.currentUser()?.name }}</span>
            </button>
            <div class="absolute right-0 w-48 mt-2 py-2 bg-white rounded-xl shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right">
              <a routerLink="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">Profile</a>
              <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">Log out</button>
            </div>
          </div>
        </ng-container>

        <!-- Unauthenticated Links -->
        <ng-container *ngIf="!authService.isAuthenticated()">
          <a routerLink="/login" class="text-gray-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Log in</a>
          <a routerLink="/register" class="bg-gray-900 text-white hover:bg-indigo-600 hover:shadow-lg hover:shadow-indigo-200 px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300">Sign up</a>
        </ng-container>
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center sm:hidden">
        <button (click)="toggleMenu()" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500">
          <span class="sr-only">Open main menu</span>
          <svg *ngIf="!isMenuOpen" class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="isMenuOpen" class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="sm:hidden bg-white border-t border-gray-100 px-2 pt-2 pb-3 space-y-1 shadow-lg absolute w-full left-0">
    <a routerLink="/" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Home</a>
    <a routerLink="/search" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Book a Bus</a>
    
    <ng-container *ngIf="authService.isAuthenticated()">
      <a *ngIf="!authService.isAdmin() && !authService.isOperator()" routerLink="/bookings" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">My Bookings</a>
      <a *ngIf="authService.isAdmin()" routerLink="/admin/dashboard" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Admin Dashboard</a>
      <a *ngIf="authService.isOperator()" routerLink="/operator/dashboard" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Operator Dashboard</a>
      
      <div class="border-t border-gray-100 my-2"></div>
      <a routerLink="/profile" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Profile</a>
      <button (click)="logout()" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-red-600 hover:bg-red-50">Log out</button>
    </ng-container>

    <ng-container *ngIf="!authService.isAuthenticated()">
      <a routerLink="/login" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-indigo-600 hover:bg-indigo-50">Log in</a>
      <a routerLink="/register" (click)="toggleMenu()" class="block px-3 py-2 rounded-md text-base font-medium text-indigo-600 hover:bg-indigo-50">Sign up</a>
    </ng-container>
  </div>
</nav>
